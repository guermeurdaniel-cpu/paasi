name: Mise a jour contributions PAASI

on:
  schedule:
    - cron: "0 19 * * 1-5"   # 19h UTC lun-ven
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Dependances
        run: pip install curl_cffi

      - name: Scraper
        run: python scraper.py

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add contributions.json
          git diff --cached --quiet || git commit -m "MAJ contributions $(date -u +%F)"
          git push
